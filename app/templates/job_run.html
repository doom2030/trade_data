{% extends "base.html" %}
{% block title %}触发任务{% endblock %}
{% block content %}
<div class="page-header">
  <h2>触发任务</h2>
  <p>同步基础数据 · 日线更新 · 单股补采</p>
</div>

<div class="quick-actions">
  <a href="/jobs" class="btn btn-secondary">返回任务列表</a>
</div>

{% if message %}
<div class="alert-success glass-panel" style="padding:16px 24px;margin-bottom:20px">{{ message }}</div>
{% endif %}

<div class="stat-grid">
  <form class="stat-card glass-panel task-card" method="post" action="/jobs/run">
    <input type="hidden" name="action" value="sync_stock_meta">
    <div class="stat-label">同步股票池</div>
    <div class="form-group">
      <label class="form-label">快照日期</label>
      <input class="form-input" type="date" name="snapshot_date" value="{{ today }}">
    </div>
    <button type="submit" class="btn btn-primary btn-sm">创建任务</button>
  </form>

  <form class="stat-card glass-panel task-card" method="post" action="/jobs/run">
    <input type="hidden" name="action" value="sync_industry_boards">
    <div class="stat-label">同步行业板块</div>
    <div class="form-group">
      <label class="form-label">快照日期</label>
      <input class="form-input" type="date" name="snapshot_date" value="{{ today }}">
    </div>
    <div class="form-group">
      <label class="form-label">来源</label>
      <select class="form-select" name="source">
        <option value="auto">自动</option>
        <option value="ths">同花顺</option>
        <option value="sw">申万</option>
      </select>
    </div>
    <input type="hidden" name="sleep_seconds" value="0.35">
    <button type="submit" class="btn btn-primary btn-sm">创建任务</button>
  </form>

  <form class="stat-card glass-panel task-card" method="post" action="/jobs/run">
    <input type="hidden" name="action" value="daily_update">
    <div class="stat-label">日线日常更新（前复权）</div>
    <div class="form-group">
      <label class="form-label">交易日</label>
      <input class="form-input" type="date" name="trade_date" value="{{ today }}">
    </div>
    <button type="submit" class="btn btn-primary btn-sm">创建任务</button>
  </form>
</div>

<div class="glass-panel" style="margin-top:20px;padding:20px 24px">
  <h3 style="font-size:15px;font-weight:600;margin-bottom:16px">区间补采（日线 · 前复权）</h3>
  <form class="filter-bar" method="post" action="/jobs/run" style="padding:0;margin:0;border:0">
    <input type="hidden" name="action" value="manual_backfill_range">
    <input type="hidden" name="frequency" value="day">
    <div class="form-group">
      <label class="form-label">股票代码</label>
      <input class="form-input" name="symbol" placeholder="sh.600000" required>
    </div>
    <div class="form-group">
      <label class="form-label">开始日期</label>
      <input class="form-input" type="date" name="start" value="{{ today }}" required>
    </div>
    <div class="form-group">
      <label class="form-label">结束日期</label>
      <input class="form-input" type="date" name="end" value="{{ today }}" required>
    </div>
    <button type="submit" class="btn btn-primary">创建补采任务</button>
  </form>
</div>
{% endblock %}
